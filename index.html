<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Rental</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#1c1c1d] text-white">
    <div class="p-6">
        <h1 class="text-xl font-bold mb-6 text-center text-blue-400">NFT Assets Marketplace</h1>
        
        <div id="catalog" class="space-y-4">
            <div class="bg-[#2c2c2e] p-4 rounded-2xl border border-gray-700">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 class="text-lg font-bold">@premium_alias</h2>
                        <p class="text-xs text-gray-400">Telegram Username (NFT)</p>
                    </div>
                    <span class="bg-blue-500/20 text-blue-400 text-[10px] px-2 py-1 rounded-full uppercase">Available</span>
                </div>
                <div class="mt-4 flex justify-between items-center">
                    <p class="text-sm font-semibold">10 TON <span class="text-gray-400 font-normal">/ mo</span></p>
                    <button onclick="kirimPesan('Username @premium_alias', '1 Bulan')" class="bg-blue-600 hover:bg-blue-500 px-5 py-2 rounded-xl text-sm font-medium transition">Sewa</button>
                </div>
            </div>

            <div class="bg-[#2c2c2e] p-4 rounded-2xl border border-gray-700">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 class="text-lg font-bold">Rare Gift #888</h2>
                        <p class="text-xs text-gray-400">Collectible Gift</p>
                    </div>
                    <span class="bg-blue-500/20 text-blue-400 text-[10px] px-2 py-1 rounded-full uppercase">Available</span>
                </div>
                <div class="mt-4 flex justify-between items-center">
                    <p class="text-sm font-semibold">5 TON <span class="text-gray-400 font-normal">/ mo</span></p>
                    <button onclick="kirimPesan('Gift #888', '1 Bulan')" class="bg-blue-600 hover:bg-blue-500 px-5 py-2 rounded-xl text-sm font-medium transition">Sewa</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Agar layar terbuka penuh

        function kirimPesan(item, durasi) {
            const data = {
                nama_aset: item,
                durasi_sewa: durasi
            };
            // Fungsi ini mengirim data ke bot dan otomatis menutup Mini App
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
