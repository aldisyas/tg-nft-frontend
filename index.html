<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRAGGMENT RENTAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=JetBrains+Mono&family=Urbanist:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Urbanist', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            overflow-x: hidden;
        }
        .cyber-bg {
            background: radial-gradient(circle at 50% -20%, #1e293b 0%, #020617 80%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(161, 227, 249, 0.1);
            transition: all 0.3s ease;
        }
        .glass-card:active {
            transform: scale(0.98);
            border-color: #a1e3f9;
        }
        .locked-card {
            background-image: linear-gradient(rgba(2, 6, 23, 0.8), rgba(2, 6, 23, 0.8)), 
                              url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); /* Efek Mesh */
            opacity: 0.6;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .syne { font-family: 'Syne', sans-serif; }
        
        /* Navigasi Simpel antar halaman */
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body class="cyber-bg min-h-screen p-6">

    <div id="selection-page" class="page active pt-20">
        <header class="mb-10 text-center">
            <h1 class="syne text-3xl tracking-tighter text-white uppercase italic">Fraggment<span class="text-cyan-400">.</span></h1>
            <p class="mono text-[10px] text-cyan-400/60 mt-2 uppercase tracking-widest">Select Category</p>
        </header>

        <div class="grid grid-cols-1 gap-4">
            <div onclick="showPage('catalog-page')" class="glass-card rounded-3xl p-6 relative overflow-hidden h-44 flex flex-col justify-end border-l-4 border-l-cyan-400">
                <div class="absolute top-4 right-6 text-cyan-400 opacity-20">
                    <svg width="60" height="60" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-5-9h10v2H7z"/></svg>
                </div>
                <h2 class="syne text-2xl text-white">USERNAMES</h2>
                <p class="mono text-xs text-cyan-400 mt-1">Status: Online</p>
            </div>

            <div class="locked-card rounded-3xl p-6 relative overflow-hidden h-44 flex flex-col justify-end border-1 border-white/5 grayscale">
                <div class="absolute inset-0 flex items-center justify-center opacity-40">
                    <svg width="80" height="80" fill="#a1e3f9" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                </div>
                <h2 class="syne text-2xl text-slate-500">GIFTS</h2>
                <p class="mono text-xs text-slate-500 mt-1 italic">Status: Locked</p>
            </div>
        </div>
    </div>

    <div id="catalog-page" class="page pt-10">
        <button onclick="showPage('selection-page')" class="mono text-xs text-cyan-400 mb-6 flex items-center">
            <span class="mr-2">←</span> BACK TO MENU
        </button>
        
        <h2 class="syne text-2xl mb-6">AVAILABLE <span class="text-cyan-400">USERS</span></h2>
        
        <div id="nft-list" class="space-y-4">
            </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Data Dummy
        const items = [
            { id: 1, name: "@jeongiani", price: "50 TON" },
            { id: 2, name: "@ijiwoo", price: "100 TON" }
        ];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function renderItems() {
            const list = document.getElementById('nft-list');
            list.innerHTML = items.map(item => `
                <div class="glass-card p-5 rounded-2xl flex justify-between items-center border border-white/5">
                    <div>
                        <p class="mono text-[10px] text-cyan-400">PREMIUM USN</p>
                        <h3 class="syne text-lg">${item.name}</h3>
                        <p class="mono text-sm mt-1">${item.price}</p>
                    </div>
                    <button onclick="sewa('${item.name}', '${item.price}')" class="bg-cyan-500 hover:bg-cyan-400 text-black font-bold py-2 px-6 rounded-xl text-sm transition-all">
                        SEWA
                    </button>
                </div>
            `).join('');
        }

        function sewa(name, price) {
            tg.sendData(JSON.stringify({ item: name, price: price }));
            tg.close();
        }

        renderItems();
    </script>
</body>
</html>
